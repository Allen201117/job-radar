name: purge-expired

# 方针（2026-06-18 定）：expired 死岗 = sweep/dead-link-audit 逐岗探活**确认撤岗**（404 / hotjob state=1017 /
# wt req_state=9501 / SPA dead marker）→ **永久删除、不保留**，持续回收空间，防 expired 物理累积把库撑过 500MB。
#   · 只删 status='expired'（确认死）；status='removed'（抓取漏看、可复活）保留不动。
#   · job_actions.job_id ON DELETE CASCADE 连带删（用户对已撤岗的收藏本就无意义）。
#   · DELETE + 普通 VACUUM(ANALYZE)：释放行空间进表内空闲列表供新岗复用 + 刷新统计；**不每日 VACUUM FULL**
#     （避免每日锁表）。db_size 真正还盘缩小由 maintenance-vacuum -f full=true 按需手动跑（删大批后）。
# 用 JOBS_DATABASE_URL secret（自建香港 jobs 库；jobs 已迁过去，expired 死岗在那儿）。psql 自动逐句提交故 VACUUM 可跑。

on:
  schedule:
    - cron: "30 2 * * *"   # 每日 UTC 02:30，错开 daily-crawl(0:00)/purge 与抓取/巡检
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Purge expired jobs + vacuum
        env:
          JOBS_DATABASE_URL: ${{ secrets.JOBS_DATABASE_URL }}
          JOBS_DATABASE_SSL_CA: ${{ secrets.JOBS_DATABASE_SSL_CA }}
          JOBS_DATABASE_TLS_SERVERNAME: ${{ secrets.JOBS_DATABASE_TLS_SERVERNAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "${JOBS_DATABASE_URL:-}" ]; then
            echo "::error::JOBS_DATABASE_URL secret 未配置（与 db-migrate 同一个）。"
            exit 1
          fi
          source scripts/enable-jobs-db-strict-tls.sh
          started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          deleted_count="$(
            PGOPTIONS="-c statement_timeout=1800000" \
            psql "$JOBS_DATABASE_URL" -v ON_ERROR_STOP=1 -qAt -c \
              "with deleted as (delete from jobs where status = 'expired' returning 1) select count(*) from deleted"
          )"
          echo "=== 本轮精确删除量 ==="
          echo "$deleted_count"
          psql "$JOBS_DATABASE_URL" -v ON_ERROR_STOP=1 -P pager=off <<'SQL'
          set statement_timeout = '1800s';
          \echo '=== VACUUM (ANALYZE) jobs（释放行空间供复用，非 FULL 不缩 db_size）==='
          vacuum (analyze) jobs;
          \echo '=== 剩余 status 分布 ==='
          select status, count(*) from jobs group by status order by count(*) desc;
          SQL
          echo "[purge-expired] done."
          export OPS_STARTED_AT="$started_at"
          export OPS_DELETED_COUNT="$deleted_count"
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          from datetime import datetime, timezone

          try:
              base = os.environ["SUPABASE_URL"].rstrip("/")
              key = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
              body = json.dumps({
                  "module": "purge_expired",
                  "metrics": {"deleted": int(os.environ.get("OPS_DELETED_COUNT", "0"))},
                  "status": "success",
                  "started_at": os.environ["OPS_STARTED_AT"],
                  "finished_at": datetime.now(timezone.utc).isoformat(),
              }).encode()
              req = urllib.request.Request(
                  base + "/rest/v1/ops_runs",
                  data=body,
                  method="POST",
                  headers={
                      "apikey": key,
                      "Authorization": "Bearer " + key,
                      "Content-Type": "application/json",
                      "Prefer": "return=minimal",
                  },
              )
              urllib.request.urlopen(req, timeout=15).read()
          except Exception as exc:
              sys.stderr.write(
                  f"[ops-runs] purge_expired 台账写入失败（清理已完成，不受影响）: {type(exc).__name__}\n"
              )
          PY
