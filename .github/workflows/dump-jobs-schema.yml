name: dump-jobs-schema

# 一次性（Phase 1 迁库用）：从 Supabase 导出 jobs 表的精确 DDL（列/索引/触发器），
# 用于在自建香港 Postgres 上忠实重建。只读、不改库。复用 db-migrate 的 SUPABASE_DB_URL。
on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg client 16
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Dump jobs schema
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "${SUPABASE_DB_URL:-}" ]; then echo "::error::SUPABASE_DB_URL 未配置"; exit 1; fi
          echo "========== CREATE TABLE jobs (+indexes/triggers) =========="
          pg_dump --schema-only --no-owner --no-privileges -t public.jobs "$SUPABASE_DB_URL"
          echo "========== function bodies =========="
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -P pager=off \
            -c "\sf canonicalize_jd_url" \
            -c "\sf count_valid_active_jobs" 2>&1 || true
          echo "[dump-jobs-schema] done."
