name: dump-jobs-schema
on:
  workflow_dispatch:
jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg client 17 (PGDG)
        run: |
          sudo apt-get update && sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update && sudo apt-get install -y postgresql-client-17
      - name: Dump search_tokens + jobs public functions inventory
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "${SUPABASE_DB_URL:-}" ]; then echo "::error::SUPABASE_DB_URL 未配置"; exit 1; fi
          P=/usr/lib/postgresql/17/bin
          echo "========== search_tokens body =========="
          $P/psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -P pager=off -c "\sf search_tokens" 2>&1 || true
          echo "========== all public functions (names only) =========="
          $P/psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -P pager=off -c "select proname, pg_get_function_arguments(oid) from pg_proc where pronamespace='public'::regnamespace order by proname;"
          echo "[dump] done."
