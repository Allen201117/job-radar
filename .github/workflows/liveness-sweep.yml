name: liveness-sweep

# 失活清扫（质量方针）：对全部带 closure detector 的 httpx 源逐岗 detail 探活，源站撤岗信号
#   （hotjob state=1017 / wt req_state=9501 / workday·oracle·eightfold·smartrecruiters 404…）→ status='expired'。
# 与 daily-crawl 内置 sweep 的区别：**本工作流只探活、不抓列表**，故不会重新灌入「已关闭但列表仍返回」的假 active
#   （wt~52% / hotjob~71% 列表夹带已关闭岗）——纯挤干失活，不回潮。
# 按 adapter 分片并行（各 shard 只 drain 自己 adapter，互不重叠）；按 enrich_checked_at 最旧轮转
#   （从未探活的 NULL 最先）→ 优先打掉新灌入的假 active。每日 08:00 UTC 定时自动跑 + 可手动加速直到增量趋零。
# 浏览器源（beisen/moka/feishu 及变体、自建大厂 SPA）的软 404 走 dead-link-audit.yml，不在此列。
on:
  # 发现/保鲜分流后（02 spec §2）：daily-crawl 不再背内联 sweep，保鲜由本工作流独立承担。
  # 提频到每日 3 次（UTC 4/12/20，北京 12/20/次日4 点）补偿原 daily 内联 4×/day 的撤岗节拍，
  # 维持 today 24h / search 72h 核验 SLA；避开 daily-crawl(1/7/13/17)/purge(02:30)/晚间重档(18–22)。
  # 频率是可调旋钮：SLA 紧→提频，CI 预算紧→降频。
  schedule:
    - cron: "0 4,12,20 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "单 adapter 本轮最多探活多少岗（0=全部）"
        required: false
        default: "50000"
      workers:
        description: "并发线程数（默认 6，配合 max-parallel:4 → 峰值 ~28 HK 连接，无人值守定时也安全；有人盯可手动调高）"
        required: false
        default: "6"

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      # max-parallel:4 = 同时只 4 个分片在跑 → 峰值 ~4×(workers+1) 连接，护住香港库 max_connections=100
      #（app pool ~10 + 每 3h 的 enrich-backlog 突发 ~45 连接叠加也不挤爆）。小源先跑完释放槽位，
      # 大源（wt/hotjob/workday）很快拿到并发槽，关键路径不被拖慢。
      max-parallel: 4
      matrix:
        # C 类大厂自建门户（amazon/apple/meituan/microsoft/sf_express/tencent/vivo）2026-06-25 纳入：
        # 逐岗 detail 探活，关闭信号 live 实测（见 crawler/enrich.py 各 _detail_xxx 注释）。
        adapter: [wt, hotjob, workday, oracle, eightfold, smartrecruiters, greenhouse, lever,
                  amazon, apple, meituan, microsoft, sf_express, tencent, vivo]
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Phase 1：jobs 在自建香港 PG；不注入则 crawler/jobs_db.py 回退空 Supabase（见 daily-crawl.yml 注释）。
      JOBS_DATABASE_URL: ${{ secrets.JOBS_DATABASE_URL }}
      JOBS_DATABASE_SSL_CA: ${{ secrets.JOBS_DATABASE_SSL_CA }}
      JOBS_DATABASE_TLS_SERVERNAME: ${{ secrets.JOBS_DATABASE_TLS_SERVERNAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install crawler dependencies
        run: pip install -r crawler/requirements.txt
      - name: Liveness sweep (${{ matrix.adapter }})
        run: |
          python crawler/enrich_backlog.py --sweep \
            --adapter "${{ matrix.adapter }}" \
            --limit "${{ github.event.inputs.limit || '50000' }}" \
            --workers "${{ github.event.inputs.workers || '10' }}"
