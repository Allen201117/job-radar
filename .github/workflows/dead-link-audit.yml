name: dead-link-audit

# 浏览器源(moka/beisen/feishu 等 SPA)死活巡检：无头渲染 active 岗的 jd_url，识别软404
# (返200但JS渲染'职位不存在/已下线')→ status='expired'。补 enrich httpx detail-fetcher 覆盖不到的 SPA 源。
#   · 选岗按 enrich_checked_at 最旧优先**轮转**（取代旧「全库深翻页抽样」：抽样随机、深 OFFSET 撞超时、
#     每轮重复检同一批、不记录已检）；每探一岗盖时间戳 → 下轮取下一批 → 全量滚动覆盖、持续保鲜。
#   · 定时(每日)= 6 分片并行 --apply：持续把失活浏览器源岗下架，~7 天覆盖全量后维持新鲜。
#   · 手动 workflow_dispatch 填 sweep=<source_url 子串> = 对该源全量逐岗审计(整治某个已知坏源，仅 shard 0/6 跑)。
# ATS 源(workday/oracle/...)的撤岗由 enrich httpx detail-fetcher(404→expired) + liveness-sweep 负责，不在此。

on:
  schedule:
    - cron: "0 22 * * *"   # 每日 UTC 22:00。排在 browser-drain(20:00,~50min) 之后，三个 6-shard 重档
    #                        串行不叠加：enrich-crawl(18:00)→browser-drain(20:00)→本 dead-link-audit(22:00)。
    - cron: "30 3,15 * * *" # 每日 UTC 03:30/15:30。必投清单轻量保鲜，避开 daily-crawl/liveness-sweep/purge 重档。
  workflow_dispatch:
    inputs:
      sweep:
        description: "全量逐岗审计某源(source_url 子串,如 agirobot)；留空=浏览器源轮转巡检"
        required: false
        default: ""
      limit:
        description: "轮转模式：单 shard 本轮渲染上限(控 CI 时长，~3s/岗)"
        required: false
        default: "1500"
      apply:
        description: "true=下架确认 dead + 盖巡检时间戳；false=只报告(dry-run)"
        required: false
        default: "true"

jobs:
  audit:
    if: github.event_name != 'schedule' || github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 90   # 1500 岗 × ~3s ≈ 75min；远低于 GH 6h 硬杀
    strategy:
      fail-fast: false
      matrix:
        shard: ["0/6", "1/6", "2/6", "3/6", "4/6", "5/6"]   # 6 片并行轮转、互不重叠
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Phase 1：jobs 在自建香港 PG；不注入则 crawler/jobs_db.py 回退空 Supabase（见 daily-crawl.yml 注释）。
      JOBS_DATABASE_URL: ${{ secrets.JOBS_DATABASE_URL }}
      JOBS_DATABASE_SSL_CA: ${{ secrets.JOBS_DATABASE_SSL_CA }}
      JOBS_DATABASE_TLS_SERVERNAME: ${{ secrets.JOBS_DATABASE_TLS_SERVERNAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r crawler/requirements.txt
      - name: Install chromium
        run: python -m playwright install --with-deps chromium
      - name: Run dead-link audit (shard ${{ matrix.shard }})
        working-directory: crawler
        run: |
          # sweep 模式是全量逐岗（不分片）→ 只在 shard 0/6 跑一次，其余分片跳过避免 6× 重复。
          if [ -n "${{ inputs.sweep }}" ] && [ "${{ matrix.shard }}" != "0/6" ]; then
            echo "sweep 模式仅 shard 0/6 执行，跳过 ${{ matrix.shard }}"; exit 0
          fi
          ARGS=""
          if [ "${{ inputs.apply }}" != "false" ]; then ARGS="$ARGS --apply"; fi
          if [ -n "${{ inputs.sweep }}" ]; then
            ARGS="$ARGS --sweep ${{ inputs.sweep }}"
          else
            # 必投优先只改候选分配：最多 50% 分片容量先保头部公司，剩余仍按原轮转补满。
            ARGS="$ARGS --shard ${{ matrix.shard }} --limit ${{ inputs.limit || '1500' }} --must-apply-first"
          fi
          echo "audit args:$ARGS"
          python3 audit_dead_links.py $ARGS

  must_apply_audit:
    if: github.event_name == 'schedule' && github.event.schedule == '30 3,15 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 45   # 400 岗 × ~3s ≈ 20min；给浏览器安装和网络抖动留余量
    strategy:
      fail-fast: false
      # max-parallel:2 = 同时只 2 个轻量分片在跑 → 峰值约 2 条香港库 jobs 连接，护住 max_connections=100。
      #（app pool + liveness-sweep/enrich-backlog 突发叠加也不挤爆）。两片跑完即释放槽位，专门保头部公司新鲜度。
      max-parallel: 2
      matrix:
        shard: ["0/2", "1/2"]   # 2 片轻量轮转、互不重叠
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Phase 1：jobs 在自建香港 PG；不注入则 crawler/jobs_db.py 回退空 Supabase（见 daily-crawl.yml 注释）。
      JOBS_DATABASE_URL: ${{ secrets.JOBS_DATABASE_URL }}
      JOBS_DATABASE_SSL_CA: ${{ secrets.JOBS_DATABASE_SSL_CA }}
      JOBS_DATABASE_TLS_SERVERNAME: ${{ secrets.JOBS_DATABASE_TLS_SERVERNAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r crawler/requirements.txt
      - name: Install chromium
        run: python -m playwright install --with-deps chromium
      - name: Run must-apply dead-link audit (shard ${{ matrix.shard }})
        working-directory: crawler
        run: |
          ARGS="--apply --shard ${{ matrix.shard }} --must-apply-only --limit 400"
          echo "audit args:$ARGS"
          python3 audit_dead_links.py $ARGS
