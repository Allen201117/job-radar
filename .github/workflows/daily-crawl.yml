name: daily-job-crawl

on:
  schedule:
    # 每日 4 次（UTC 1/7/13/17 ≈ 中国 9/15/21/次日1点），快档 httpx 轻量抓取，让库全天保持新鲜，
    # 减轻用户对「主动刷新」的依赖（主动刷新慢且真新增少）。选这 4 个时段：避开 enrich-backlog(每 3h 整点)
    # 与 18-23 UTC 的富化/巡检密集区，不挤占重档资源。公开仓库 Actions 分钟无限、httpx 档并发数分钟即完，
    # 提频成本低。原为每日 1 次(UTC 0:00)。
    - cron: "0 1,7,13,17 * * *"
  workflow_dispatch:
    # 手动触发(无 mode) = 快档 httpx 抓取（不开浏览器、不逐岗富化）；带 mode=discovery 的入参 = 按需「浏览器发现」（由 /api/discovery/dispatch 触发）。
    # 全量逐岗富化 + 浏览器源（beisen/moka/feishu/google/bytedance/tencent）由 enrich-crawl.yml（按天 1/7 轮转）负责。
    inputs:
      mode:
        description: "discovery 时跑按需浏览器发现；留空跑全量抓取"
        required: false
        default: ""
      run_id:
        description: "discovery_runs.id（API 端已 insert 的 queued 行）"
        required: false
        default: ""
      query:
        description: "发现关键词"
        required: false
        default: ""
      city:
        description: "城市（可空）"
        required: false
        default: ""
      job_type:
        description: "岗位方向（可空）"
        required: false
        default: ""
      exclude:
        description: "排除词 JSON 数组（来自用户偏好 exclude_keywords，命中即丢）"
        required: false
        default: ""
      limit:
        description: "返回上限"
        required: false
        default: "30"
      max_pages:
        description: "每源翻页上限（发现产出量↔CI 耗时权衡，1-10，默认 4）"
        required: false
        default: "4"
      sweep_limit:
        description: "死活巡检本次复检岗位数上限（手动加速清死岗用；留空=每日默认 12000）"
        required: false
        default: "12000"

jobs:
  crawl:
    runs-on: ubuntu-latest
    # 整体安全网：远低于 GitHub Actions 6h 硬杀。快档 httpx step 50min(瓶颈=逐岗 upsert)；按需 discovery 55min；
    # 巡检 step 最长 65min（手动大清扫）→ 抓取 ~5min + 巡检 65min < 90min。
    timeout-minutes: 90
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Phase 1：jobs 热表已迁自建香港 PG。crawler/jobs_db.py gated on JOBS_DATABASE_URL——
      # 不注入则 enabled()=False、jobs 写读回退到（已清空的）Supabase。run.py 抓新岗 + 死活巡检都靠它落香港库。
      JOBS_DATABASE_URL: ${{ secrets.JOBS_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install crawler dependencies
        run: pip install -r crawler/requirements.txt

      # Playwright 仅按需「浏览器发现」/「刷新公司库」需要（含浏览器源）；快档 httpx 跳过此步省 1-2min。
      - name: Install Playwright browser (discovery / company_refresh)
        if: ${{ github.event.inputs.mode == 'discovery' || github.event.inputs.mode == 'company_refresh' }}
        run: python -m playwright install --with-deps chromium

      # 快档：schedule / 无 mode 手动触发 → 只跑 httpx 并发档 + 跳过逐岗富化(CRAWL_DETAIL_CAP=0)。
      # 瓶颈非解析，是 db.upsert_job 每岗 2 次 Supabase REST(先查后写)，全量数万岗 → 6-10万往返。
      # 公开仓库分钟无限，硬上限是单 job 6h；50min ≪ 6h，留足余量。并发 6→10 提速(更高易触 Errno 35)。
      - name: Run crawler (fast httpx tier)
        if: ${{ github.event.inputs.mode != 'discovery' && github.event.inputs.mode != 'company_refresh' }}
        timeout-minutes: 50
        run: python crawler/run.py --tier httpx
        env:
          CRAWL_DETAIL_CAP: "0"
          CRAWL_CONCURRENCY: "10"

      # 死活巡检：与每日抓新岗同步跑——复检 active 岗，源站撤岗(404/410 / hotjob state=1017 / wt req_state=9501)
      # → status='expired'。httpx 类、按 enrich_checked_at 最旧轮转、限量（~5 天轮转完整库一遍），
      # 治「岗位关闭后没人下架→点开页面不存在」。失败不阻断抓取（continue-on-error）。
      # 监控：看本 step 日志的 expired/miss/err 比例；若 miss 偏高（hotjob 单 host 限流）再调 workers/per-host。
      - name: Liveness sweep (expire dead jobs)
        if: ${{ github.event.inputs.mode != 'discovery' && github.event.inputs.mode != 'company_refresh' }}
        timeout-minutes: 65
        working-directory: crawler
        run: python enrich_backlog.py --sweep --limit ${{ github.event.inputs.sweep_limit || '12000' }} --workers 8
        continue-on-error: true

      # 按需「浏览器发现」/「刷新公司库」：DISCOVERY_* 触发 discovery.run_from_env（按 mode 路由到
      # run_discovery / run_company_refresh），跑完即退。company_refresh 的 scope 走 DB diagnostics，
      # 故只需 DISCOVERY_MODE + DISCOVERY_RUN_ID（其余入参为空不影响）。
      - name: Run on-demand discovery / company refresh (browser)
        if: ${{ github.event.inputs.mode == 'discovery' || github.event.inputs.mode == 'company_refresh' }}
        timeout-minutes: 55
        run: python crawler/run.py
        env:
          DISCOVERY_MODE: ${{ github.event.inputs.mode }}
          DISCOVERY_RUN_ID: ${{ github.event.inputs.run_id }}
          DISCOVERY_QUERY: ${{ github.event.inputs.query }}
          DISCOVERY_CITY: ${{ github.event.inputs.city }}
          DISCOVERY_JOB_TYPE: ${{ github.event.inputs.job_type }}
          DISCOVERY_EXCLUDE: ${{ github.event.inputs.exclude }}
          DISCOVERY_LIMIT: ${{ github.event.inputs.limit }}
          DISCOVERY_MAX_PAGES: ${{ github.event.inputs.max_pages }}
