name: enrichment-crawl
# 重档「逐岗富化」：浏览器源(beisen/moka/feishu/google/bytedance/tencent) + 全量逐岗 summary 详情。
# 提速：改为 N 片**并行跨 runner**（strategy.matrix），每天**全量覆盖一遍**（旧：按天 1/3 轮转、每源每
# ~3 天才刷一次）。host-aware 分片（run.py _shard_by_host）保证同一主机的源落同一片 → 跨 runner 不会
# 并发轰同一台服务器（防 Errno 35 限流，2026-06-10 实锤 wecruit 102 源）。实测全量浏览器档 267min
# ÷ 6 片 ≈ 单片 ~45min。快档 daily-crawl.yml 只抓 httpx 列表、跳过富化（CRAWL_DETAIL_CAP=0）。
# ⚠️ matrix 的片数与 --shard-count 必须一致（现为 6）；改片数要两处同改。

on:
  schedule:
    # UTC 18:00 = 中国/新加坡 02:00；与快档(UTC 00:00)错开 18h，避免同时写库。
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      tier:
        description: "all=全量富化(默认，含 httpx 富化器) | browser=只跑浏览器档 | httpx=只跑并发档"
        required: false
        default: "all"

jobs:
  enrich:
    strategy:
      fail-fast: false  # 一片失败不取消其余片（各片独立，单片挂了其余照常覆盖）
      matrix:
        shard: [0, 1, 2, 3, 4, 5]  # 6 片并行；与下方 --shard-count 6 必须一致
    runs-on: ubuntu-latest
    # 单片 ~45-60min（全量 267min ÷ 6）；180 留足余量，触顶=提前失败留日志而非被 GitHub 6h 硬杀静默 cancel。
    timeout-minutes: 180
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Phase 1：jobs 在自建香港 PG；不注入则 crawler/jobs_db.py 回退空 Supabase（见 daily-crawl.yml 注释）。
      JOBS_DATABASE_URL: ${{ secrets.JOBS_DATABASE_URL }}
      CRAWL_CONCURRENCY: "6"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install crawler dependencies
        run: pip install -r crawler/requirements.txt

      - name: Install Playwright browser (SPA browser-intercept tier)
        run: python -m playwright install --with-deps chromium

      # 并行分片：matrix.shard 提供片号（0-5），run.py 内 _shard_by_host 按主机分桶取本片的源。
      - name: Run enrichment crawl (parallel shard, full per-job detail)
        run: |
          python crawler/run.py \
            --tier "${{ github.event.inputs.tier || 'all' }}" \
            --shard-index "${{ matrix.shard }}" \
            --shard-count 6
