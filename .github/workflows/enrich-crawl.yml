name: enrichment-crawl
# 重档「逐岗富化」：浏览器源(beisen/moka/feishu/google/bytedance/tencent) + 全量逐岗 summary 详情。
# 按天 1/3 轮转（date -u +%w → shard, run.py 内 %shard_count），每源每 ~3 天刷一次保鲜（旧 1/7=每周一次太陈）。
# 实测：全量浏览器档单跑 267min < 330min 预算（run 27535738881），故有富余把轮转从 1/7 提到 1/3。
# 快档 daily-crawl.yml 只抓 httpx 列表、跳过富化（CRAWL_DETAIL_CAP=0）；逐岗富化与浏览器源全压在这里分摊。
# tier=all（默认）会把 httpx 富化器（hotjob/workday/oracle/eightfold/smartrecruiters，快档跳过其富化）也按轮转补 summary。

on:
  schedule:
    # UTC 18:00 = 中国/新加坡 02:00；与快档(UTC 00:00)错开 18h，避免同时写库。
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      shard_index:
        description: "跑第几片源（0-based；留空=按星期几 date -u +%w 自动轮转 0-6）"
        required: false
        default: ""
      shard_count:
        description: "共分几片（默认 3=按天 1/3 轮转，每源每 ~3 天刷一次；实测全量浏览器档 267min<330min 预算，故从旧 1/7 提频。调大=降频省 CI）"
        required: false
        default: "3"
      tier:
        description: "all=全量富化(默认，含 httpx 富化器) | browser=只跑浏览器档 | httpx=只跑并发档"
        required: false
        default: "all"

jobs:
  enrich:
    runs-on: ubuntu-latest
    # 硬上限 < GitHub Actions 6h 硬杀(360)：分片后单跑应远小于此；触顶=提前失败留日志而非被静默 cancel。
    timeout-minutes: 330
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Phase 1：jobs 在自建香港 PG；不注入则 crawler/jobs_db.py 回退空 Supabase（见 daily-crawl.yml 注释）。
      JOBS_DATABASE_URL: ${{ secrets.JOBS_DATABASE_URL }}
      CRAWL_CONCURRENCY: "6"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install crawler dependencies
        run: pip install -r crawler/requirements.txt

      - name: Install Playwright browser (SPA browser-intercept tier)
        run: python -m playwright install --with-deps chromium

      # 分片序号：手动传入优先；否则按星期几 date -u +%w（0=周日..6=周六），一周 7 天恰好覆盖 0-6 全部分片。
      - name: Compute shard index
        id: shard
        run: |
          if [ -n "${{ github.event.inputs.shard_index }}" ]; then
            echo "idx=${{ github.event.inputs.shard_index }}" >> "$GITHUB_OUTPUT"
          else
            echo "idx=$(date -u +%w)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run enrichment crawl (sharded, full per-job detail)
        run: |
          python crawler/run.py \
            --tier "${{ github.event.inputs.tier || 'all' }}" \
            --shard-index "${{ steps.shard.outputs.idx }}" \
            --shard-count "${{ github.event.inputs.shard_count || '3' }}"
